<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chicago Eats Ledger</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Courier+Prime:wght@400;700&family=Special+Elite&display=swap" rel="stylesheet" />
    <style>
      :root {
        color: #2a2420;
        background: #f2ead9;
      }

      * {
        box-sizing: border-box;
      }

      html, body {
        margin: 0;
        min-height: 100%;
        font-family: 'Courier Prime', monospace;
        background: #f2ead9;
        color: #2a2420;
      }

      body {
        padding: 24px;
        background-image: repeating-linear-gradient(transparent 0 18px, rgba(42,36,32,0.04) 18px 19px),
          linear-gradient(180deg, rgba(255,255,255,0.25) 0%, rgba(242,234,217,1) 100%);
      }

      .ledger {
        max-width: 900px;
        margin: 0 auto;
        padding: 28px 32px 36px;
        background: rgba(255,255,255,0.92);
        border: 1px solid rgba(42,36,32,0.16);
        box-shadow: 0 16px 40px rgba(42,36,32,0.08);
      }

      .masthead {
        text-align: center;
        letter-spacing: 0.12em;
        font-family: 'Special Elite', cursive;
        font-size: 2.4rem;
        margin: 0 0 4px;
        color: #2a2420;
      }

      .subhead {
        text-align: center;
        margin: 0;
        font-size: 0.95rem;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      .banner {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 12px;
        margin: 0 auto 24px;
        padding-bottom: 14px;
        border-bottom: 3px double #2a2420;
        max-width: 720px;
      }

      .stamp {
        color: #b5402e;
        font-size: 0.9rem;
        font-weight: 700;
      }

      .toolbar {
        display: flex;
        justify-content: space-between;
        gap: 16px;
        flex-wrap: wrap;
        margin: 20px 0 10px;
      }

      .toggle-group {
        display: inline-flex;
        border: 1px dashed rgba(42,36,32,0.4);
        padding: 6px 10px;
        border-radius: 8px;
        background: rgba(255,255,255,0.85);
      }

      .toggle-group button {
        border: none;
        background: transparent;
        color: #2a2420;
        cursor: pointer;
        padding: 8px 12px;
        font-family: inherit;
        font-size: 0.95rem;
      }

      .toggle-group button.active {
        background: rgba(181,64,46,0.12);
        color: #b5402e;
        border-radius: 6px;
      }

      .form-card,
      .entry-card {
        background: rgba(255,255,255,0.88);
        border: 1px dotted rgba(42,36,32,0.35);
        border-radius: 12px;
        padding: 18px 18px 16px;
        margin-bottom: 18px;
      }

      .form-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 14px;
      }

      .field {
        display: flex;
        flex-direction: column;
      }

      label {
        font-size: 0.95rem;
        margin-bottom: 4px;
      }

      input,
      textarea,
      select {
        border: 1px solid rgba(42,36,32,0.22);
        border-radius: 8px;
        padding: 10px 11px;
        background: rgba(242,234,217,0.75);
        color: #2a2420;
        font-family: inherit;
        font-size: 0.95rem;
        outline: none;
      }

      textarea {
        resize: vertical;
        min-height: 76px;
      }

      .field-full {
        grid-column: 1 / -1;
      }

      .form-actions {
        display: flex;
        justify-content: flex-end;
        margin-top: 8px;
      }

      button.primary {
        border: none;
        background: #b5402e;
        color: #fff;
        padding: 11px 18px;
        border-radius: 10px;
        font-family: inherit;
        cursor: pointer;
        box-shadow: 0 4px 0 rgba(181,64,46,0.25);
      }

      button.primary:disabled {
        opacity: 0.55;
        cursor: not-allowed;
      }

      .entry-list {
        list-style: none;
        margin: 0;
        padding: 0;
      }

      .entry-card {
        position: relative;
        display: grid;
        grid-template-columns: auto 1fr;
        gap: 16px;
      }

      .entry-card + .entry-card {
        border-top: 1px dashed rgba(42,36,32,0.25);
      }

      .rank-badge {
        font-family: 'Special Elite', cursive;
        font-size: 2rem;
        line-height: 1;
        color: #a98a3a;
        padding: 6px 10px 4px;
      }

      .photo {
        width: 112px;
        height: 112px;
        border: 1px solid rgba(42,36,32,0.18);
        border-radius: 14px;
        overflow: hidden;
        background: #f7efe1;
        display: grid;
        place-items: center;
        color: rgba(42,36,32,0.55);
        font-size: 2rem;
      }

      .photo img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
      }

      .entry-main {
        display: grid;
        gap: 8px;
      }

      .entry-title {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        gap: 12px;
      }

      .entry-title h3 {
        margin: 0;
        font-size: 1.2rem;
      }

      .entry-title .tag {
        font-size: 0.92rem;
        color: #6e4f2c;
        background: rgba(169,138,58,0.08);
        padding: 4px 9px;
        border-radius: 999px;
      }

      .entry-meta {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        font-size: 0.95rem;
      }

      .note {
        margin: 0;
        font-size: 0.95rem;
        color: rgba(42,36,32,0.85);
      }

      .rating-bar {
        display: flex;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
      }

      .stars {
        display: inline-flex;
        gap: 4px;
      }

      .stars span,
      .rating-action span {
        font-size: 1rem;
        color: #a98a3a;
      }

      .rating-action {
        margin-left: auto;
        display: flex;
        align-items: center;
        gap: 6px;
      }

      .rating-action button {
        border: 1px solid rgba(42,36,32,0.2);
        background: rgba(255,255,255,0.88);
        color: #2a2420;
        padding: 6px 10px;
        border-radius: 8px;
        cursor: pointer;
        font-family: inherit;
      }

      .rate-input {
        display: inline-flex;
        align-items: center;
        gap: 6px;
      }

      .rate-input select {
        width: 90px;
      }

      .toast {
        position: fixed;
        right: 24px;
        bottom: 24px;
        background: rgba(42,36,32,0.94);
        color: #fff;
        padding: 14px 18px;
        border-radius: 12px;
        font-size: 0.95rem;
        box-shadow: 0 24px 40px rgba(42,36,32,0.2);
        z-index: 100;
      }

      @media (max-width: 760px) {
        .form-grid {
          grid-template-columns: 1fr;
        }

        .entry-card {
          grid-template-columns: 1fr;
        }

        .photo {
          width: 100%;
          min-height: 172px;
        }

        .rating-action {
          margin-left: 0;
        }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/17.0.2/umd/react.development.min.js" integrity="sha512-3sMQLVn3d3jcqnF4y+cnVY0pNIX3phqK9Yc8/L9+7Bg4YQjTKyNMvz7LDEO5a0uDIjapTEjYttkQXcK5dn7uuw==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/17.0.2/umd/react-dom.development.min.js" integrity="sha512-q4jYFGmImK24O/Z5enZV7vC0RCO3XrR1GGU15o0ozK6hb9c7FfaYjfdY+eZ5ctL8G8Ew1cJf5Kg59v+N4OyXGw==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/6.26.0/babel.min.js" integrity="sha512-kp7G9AG7Kz6aX6V1MnnVbBt3me5E8Ijr6/QIJk5WvlNlwQI2a9PovuXvTG9wCojAmK4nvtbup9q8d8U3p67Q2A==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>

    <script type="text/babel">
      const { useState, useEffect, useMemo } = React;
      const STORAGE_KEY = 'chicago-eats-ledger-spots';

      const INITIAL_SPOTS = [
        {
          id: 'bad-butter',
          name: 'Bad Butter',
          neighborhood: 'West Loop',
          tag: 'Pastries / Brunch',
          note: 'Soft almond croissants and small-batch espresso in a sunlit corner.',
          photoUrl: 'https://images.unsplash.com/photo-1504674900247-0877df9cc836?auto=format&fit=crop&w=500&q=80',
          ratings: [5, 5, 4, 5],
          createdAt: 1700000000000,
        },
        {
          id: 'purple-pig',
          name: 'Purple Pig',
          neighborhood: 'River North',
          tag: 'Mediterranean / Wine',
          note: 'Shareable plates, house-cured meats, and a buzzy wine list.',
          photoUrl: 'https://images.unsplash.com/photo-1504674900247-0877df9cc836?auto=format&fit=crop&w=501&q=80',
          ratings: [5, 4, 5, 4, 5],
          createdAt: 1700000001000,
        },
        {
          id: 'heytea',
          name: 'HeyTea',
          neighborhood: 'Chinatown',
          tag: 'Tea / Drinks',
          note: 'Creamy cheesy tea and floral fruit blends for a vibrant sip.',
          photoUrl: 'https://images.unsplash.com/photo-1510626176961-4b1e58d0cf9b?auto=format&fit=crop&w=500&q=80',
          ratings: [4, 4, 4],
          createdAt: 1700000002000,
        },
        {
          id: 'bayan-ko-diner',
          name: 'Bayan Ko Diner',
          neighborhood: 'Avondale',
          tag: 'Filipino',
          note: 'Classic lumpia, tocino, and generous diner-style breakfasts.',
          photoUrl: 'https://images.unsplash.com/photo-1551218808-94e220e084d2?auto=format&fit=crop&w=500&q=80',
          ratings: [5, 5, 5, 4],
          createdAt: 1700000003000,
        },
        {
          id: 'la-scarola',
          name: 'La Scarola',
          neighborhood: 'River West',
          tag: 'Italian',
          note: 'Old-school red sauce and family-style portions just like Nonna made.',
          photoUrl: 'https://images.unsplash.com/photo-1546069901-ba9599a7e63c?auto=format&fit=crop&w=500&q=80',
          ratings: [5, 4, 4, 5],
          createdAt: 1700000004000,
        },
      ];

      const storageGet = async (key) => {
        if (!window.storage || typeof window.storage.get !== 'function') {
          throw new Error('window.storage API unavailable');
        }
        try {
          const result = window.storage.get(key);
          return result instanceof Promise ? await result : result;
        } catch (error) {
          throw error;
        }
      };

      const storageSet = async (key, value) => {
        if (!window.storage || typeof window.storage.set !== 'function') {
          throw new Error('window.storage API unavailable');
        }
        try {
          const result = window.storage.set(key, value);
          return result instanceof Promise ? await result : result;
        } catch (error) {
          throw error;
        }
      };

      const storageList = async () => {
        if (!window.storage || typeof window.storage.list !== 'function') {
          return [];
        }
        try {
          const result = window.storage.list();
          return result instanceof Promise ? await result : result;
        } catch (error) {
          return [];
        }
      };

      const getAverage = (ratings) => {
        if (!ratings || ratings.length === 0) return 0;
        const total = ratings.reduce((sum, value) => sum + value, 0);
        return total / ratings.length;
      };

      const formatStars = (value) => {
        const full = Math.round(value);
        return Array.from({ length: 5 }, (_, index) => (
          <span key={index}>{index < full ? '★' : '☆'}</span>
        ));
      };

      const initialForm = {
        name: '',
        neighborhood: '',
        tag: '',
        note: '',
        photoUrl: '',
        rating: 5,
      };

      function App() {
        const [spots, setSpots] = useState([]);
        const [loaded, setLoaded] = useState(false);
        const [sortMode, setSortMode] = useState('top');
        const [form, setForm] = useState(initialForm);
        const [toast, setToast] = useState('');
        const [brokenImageIds, setBrokenImageIds] = useState(new Set());
        const [ratingSelections, setRatingSelections] = useState({});

        const showToast = (message) => {
          setToast(message);
          window.setTimeout(() => setToast(''), 2200);
        };

        const preloadStorage = async () => {
          await storageList();
          try {
            const stored = await storageGet(STORAGE_KEY);
            if (stored && Array.isArray(stored)) {
              setSpots(stored);
            } else {
              throw new Error('invalid data');
            }
          } catch (_) {
            await storageSet(STORAGE_KEY, INITIAL_SPOTS);
            setSpots(INITIAL_SPOTS);
          }
          setLoaded(true);
        };

        useEffect(() => {
          preloadStorage();
        }, []);

        const sortedSpots = useMemo(() => {
          const copy = [...spots];
          if (sortMode === 'newest') {
            return copy.sort((a, b) => b.createdAt - a.createdAt);
          }
          return copy.sort((a, b) => {
            const avgA = getAverage(a.ratings);
            const avgB = getAverage(b.ratings);
            if (avgA === avgB) return b.createdAt - a.createdAt;
            if (avgA === 0) return 1;
            if (avgB === 0) return -1;
            return avgB - avgA;
          });
        }, [spots, sortMode]);

        const saveSpots = async (nextSpots, actionLabel) => {
          try {
            await storageSet(STORAGE_KEY, nextSpots);
            setSpots(nextSpots);
            if (actionLabel) showToast(actionLabel);
          } catch (error) {
            console.error('Storage save failed', error);
            showToast('Unable to save right now.');
          }
        };

        const handleChange = (field) => (event) => {
          const value = event.target.value;
          setForm((prev) => ({ ...prev, [field]: value }));
        };

        const addSpot = async (event) => {
          event.preventDefault();
          if (!form.name.trim() || !form.neighborhood.trim() || !form.tag.trim()) return;
          const newSpot = {
            id: `${Date.now()}-${Math.random().toString(36).slice(2, 8)}`,
            name: form.name.trim(),
            neighborhood: form.neighborhood.trim(),
            tag: form.tag.trim(),
            note: form.note.trim(),
            photoUrl: form.photoUrl.trim(),
            ratings: [Number(form.rating)],
            createdAt: Date.now(),
          };
          const nextSpots = [newSpot, ...spots];
          await saveSpots(nextSpots, 'Spot added to ledger.');
          setForm(initialForm);
        };

        const rateSpot = async (id) => {
          const rating = Number(ratingSelections[id] || 5);
          const nextSpots = spots.map((spot) => {
            if (spot.id !== id) return spot;
            return { ...spot, ratings: [...(spot.ratings || []), rating] };
          });
          await saveSpots(nextSpots, 'Rating recorded.');
        };

        const markBroken = (id) => {
          setBrokenImageIds((prev) => new Set(prev).add(id));
        };

        const handleRatingSelect = (id, value) => {
          setRatingSelections((prev) => ({ ...prev, [id]: value }));
        };

        return (
          <div className="ledger">
            <div className="banner">
              <div>
                <h1 className="masthead">Chicago Eats Ledger</h1>
                <p className="subhead">Community restaurant rankings — permanent and shared.</p>
              </div>
              <div className="stamp">shared storage</div>
            </div>

            <div className="toolbar">
              <div className="toggle-group" role="group" aria-label="Sort spots">
                <button className={sortMode === 'top' ? 'active' : ''} onClick={() => setSortMode('top')}>
                  Top rated
                </button>
                <button className={sortMode === 'newest' ? 'active' : ''} onClick={() => setSortMode('newest')}>
                  Newest
                </button>
              </div>
            </div>

            <section className="form-card">
              <form onSubmit={addSpot}>
                <div className="form-grid">
                  <div className="field">
                    <label htmlFor="name">Spot name</label>
                    <input id="name" value={form.name} onChange={handleChange('name')} required />
                  </div>
                  <div className="field">
                    <label htmlFor="neighborhood">Neighborhood</label>
                    <input id="neighborhood" value={form.neighborhood} onChange={handleChange('neighborhood')} required />
                  </div>
                  <div className="field">
                    <label htmlFor="tag">Tag / Cuisine</label>
                    <input id="tag" value={form.tag} onChange={handleChange('tag')} required />
                  </div>
                  <div className="field">
                    <label htmlFor="photoUrl">Photo URL</label>
                    <input id="photoUrl" value={form.photoUrl} onChange={handleChange('photoUrl')} />
                  </div>
                  <div className="field field-full">
                    <label htmlFor="note">One-line note</label>
                    <textarea id="note" value={form.note} onChange={handleChange('note')} placeholder="Optional note or highlight" />
                  </div>
                  <div className="field">
                    <label htmlFor="rating">Initial rating</label>
                    <select id="rating" value={form.rating} onChange={handleChange('rating')}>
                      {[5, 4, 3, 2, 1].map((value) => (
                        <option key={value} value={value}>{`${value} star${value > 1 ? 's' : ''}`}</option>
                      ))}
                    </select>
                  </div>
                </div>
                <div className="form-actions">
                  <button type="submit" className="primary">Add a spot</button>
                </div>
              </form>
            </section>

            <ul className="entry-list">
              {!loaded && <p>Loading ledger...</p>}
              {loaded && sortedSpots.map((spot, index) => {
                const average = getAverage(spot.ratings);
                const count = spot.ratings?.length || 0;
                const ratingValue = ratingSelections[spot.id] || 5;
                const broken = brokenImageIds.has(spot.id) || !spot.photoUrl;
                return (
                  <li key={spot.id} className="entry-card">
                    <div className="rank-badge">{index + 1}</div>
                    <div className="photo">
                      {broken ? (
                        <span>🍽</span>
                      ) : (
                        <img
                          src={spot.photoUrl}
                          alt={spot.name}
                          onError={() => markBroken(spot.id)}
                        />
                      )}
                    </div>
                    <div className="entry-main">
                      <div className="entry-title">
                        <h3>{spot.name}</h3>
                        <div className="tag">{spot.tag}</div>
                      </div>
                      <div className="entry-meta">
                        <span>{spot.neighborhood}</span>
                        <span>Added {new Date(spot.createdAt).toLocaleDateString()}</span>
                        <span>{count} rating{count === 1 ? '' : 's'}</span>
                      </div>
                      {spot.note ? <p className="note">“{spot.note}”</p> : null}
                      <div className="rating-bar">
                        <div className="stars" aria-label={`Average rating ${average.toFixed(1)} out of 5`}>
                          {formatStars(average)}
                        </div>
                        <div>{average ? average.toFixed(1) : 'Unrated'}</div>
                        <div className="rating-action">
                          <label htmlFor={`rate-${spot.id}`}>+ rate this</label>
                          <div className="rate-input">
                            <select id={`rate-${spot.id}`} value={ratingValue} onChange={(e) => handleRatingSelect(spot.id, e.target.value)}>
                              {[5, 4, 3, 2, 1].map((value) => (
                                <option key={value} value={value}>{value}</option>
                              ))}
                            </select>
                            <button type="button" onClick={() => rateSpot(spot.id)}>save</button>
                          </div>
                        </div>
                      </div>
                    </div>
                  </li>
                );
              })}
            </ul>

            {toast && <div className="toast">{toast}</div>}
          </div>
        );
      }

      ReactDOM.render(<App />, document.getElementById('root'));
    </script>
  </body>
</html>
